# exanet.config.yaml — external agents and tools for ANet
#
# This file defines everything outside the core anet/ package:
#   • ExTools  — custom Python tools (in ExTools/<name>/__init__.py)
#   • ExAgents — custom agents with their tools and MCP servers
#
# The internal anet/ package is never modified. All user extensions live here.
# ─────────────────────────────────────────────────────────────────────────────


# ── External Tools ────────────────────────────────────────────────────────────
# Each tool must be a folder at the given path with an __init__.py that exports:
#   run(arguments: dict) -> dict    (sync or async)
#   SCHEMA: dict                    (OpenAI function schema)

tools:
  - name: tele_tool
    path: ExTools/tele_tool
  - name: wifi_pumpkin
    path: ExTools/wifi_punpkin


# ── External Agents ───────────────────────────────────────────────────────────
# tools: reference built-in ANet tools OR ExTools defined above
# mcp:   reference MCP servers defined in mcps/<name>/config.yaml
# prompt_file: path relative to repo root (optional — use system_prompt for inline)

agents:
  - name: tele_agent
    model: gemini-2.5-pro
    provider: google
    enabled: true
    prompt_file: ExAgents/tele_agent/prompt.md
    task_types:
      - send telegram message
      - notify via telegram
      - telegram notification
      - message user on telegram
      - send message to telegram
      - send file via telegram
      - send photo via telegram
      - send image to telegram
      - send video via telegram
      - send audio via telegram
      - send document via telegram
      - share file on telegram
    tools:
      - tele_tool
