# anet.config.yaml — models, memory, and per-agent settings for this pack.
# Edit with /settings. Only the keys you set here override the built-in defaults.
# API keys live in ~/.anet/.env (set them with /keys).
# Providers: openrouter · google · openai · anthropic · vertex_google · vertex_anthropic

# Manager — plans and coordinates every request.
# Default is a free OpenRouter model so a single free key works out of the box.
# Swap for a stronger model (e.g. anthropic/claude-sonnet-4.6) once you've added a key.
manager:
  model: nex-agi/nex-n2-pro:free
  provider: openrouter

# Per-agent overrides. Each agent uses the free default below; give any agent a
# stronger model/provider as you like. Omit an agent entirely to use the manager's.
#   max_steps        — tool-call cap (defaults: research 10, file 25, computer 20, checker 8, code 60)
#   mcp: [name]      — attach MCP servers from this pack's mcps/ (add one with /addmcp)
#   task_types: [..] — extra phrases the planner routes to this agent on
#
# Example — give code_agent a stronger model and a code-graph MCP:
#   code_agent:
#     model: anthropic/claude-sonnet-4.6
#     provider: anthropic
#     mcp: [codegraph]
agents:
  research_agent:
    model: nex-agi/nex-n2-pro:free
    provider: openrouter
  code_agent:
    model: nex-agi/nex-n2-pro:free
    provider: openrouter
  file_agent:
    model: nex-agi/nex-n2-pro:free
    provider: openrouter
  computer_agent:
    model: nex-agi/nex-n2-pro:free
    provider: openrouter
  checker_agent:
    model: nex-agi/nex-n2-pro:free
    provider: openrouter

# Self-improving skills — written after complex tasks, injected into relevant ones.
skills:
  enabled: true
  creation_threshold: 6        # min tool calls before a skill is considered
  curator_min_skills: 5        # min skills before the startup Curator runs
  max_injected: 3              # max skills injected per task
  stale_after_days: 30         # Curator archives agent-made skills unused this long
  curator_interval_hours: 12   # Curator won't re-run more often than this

# Memory — auto-built user profile + periodic nudges to save useful facts.
memory:
  user_profile_enabled: true
  nudge_enabled: true
  nudge_interval: 10           # turns between nudges (0 = off)
  incremental_interval: 5      # turns between background profile updates (0 = off)

# Context — when a conversation grows long, offer to compress/forget old messages.
context:
  enabled: true
  threshold: 40                # message count that triggers the prompt
  keep: 20                     # recent messages kept afterward

# Persona — injected into the manager's prompts only.
persona:
  soul_file: SOUL.md
  enabled: true
