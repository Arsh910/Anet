# anet.config.yaml — models, memory, and per-agent settings for this pack.
# Edit with /settings. Only the keys you set here override the built-in defaults.
# API keys live in ~/.anet/.env (set them with /keys).
# Providers: openrouter · google · openai · anthropic · vertex_google · vertex_anthropic

# Color theme for this pack — set it interactively with /theme, or by hand here.
# It travels with the pack, so different packs can look different (handy for telling
# them apart). Options: cyan · emerald · amber · violet · crimson · matrix · mono
theme: amber

# Manager — plans and coordinates every request.
# Default is a free OpenRouter model so a single free key works out of the box.
# Swap for a stronger model (e.g. anthropic/claude-sonnet-4.6) once you've added a key.
manager:
  model: nvidia/nemotron-3-super-120b-a12b:free
  provider: openrouter

# Per-agent overrides. Each agent uses the free default below; give any agent a
# stronger model/provider as you like. Omit an agent entirely to use the manager's.
#   max_steps        — tool-call cap (defaults: research 10, file 25, computer 20, checker 8, code 60)
#   mcp: [name]      — attach MCP servers from this pack's mcps/ (add one with /addmcp)
#   task_types: [..] — extra phrases the planner routes to this agent on
#
# Example — give code_agent a stronger model and a code-graph MCP:
#   code_agent:
#     model: anthropic/claude-sonnet-4.6
#     provider: anthropic
#     mcp: [codegraph]
agents:
  research_agent:
    model: google/gemma-4-26b-a4b-it
    provider: openrouter

  computer_agent:
    model: openai/gpt-oss-20b:free
    provider: openrouter

  checker_agent:
    model: deepseek/deepseek-v4-flash
    provider: openrouter

  code_agent:
    model: deepseek/deepseek-v4-flash
    provider: openrouter
    mcp: [ponytail, playwright, gentleman-book, open-design]  # playwright moved here (file_agent retired)
    task_types:
    - "ponytail mcp"
    - "playwright mcp"
    - "gentleman-book"
    - "open-design"
# Self-improving skills — written after complex tasks, injected into relevant ones.
skills:
  enabled: true
  creation_threshold: 6        # min tool calls before a skill is considered
  curator_min_skills: 5        # min skills before the startup Curator runs
  max_injected: 3              # max skills injected per task
  stale_after_days: 30         # Curator archives agent-made skills unused this long
  curator_interval_hours: 12   # Curator won't re-run more often than this

# Memory — long-term, cross-session memory (local Chroma vector store + on-device
# fastembed embeddings + your LLM). Stored under ~/.anet/memory/. Two backends:
#   recmem (default) → native 3-tier recurrence memory (subconscious→episodic→
#                      semantic); the LLM is invoked only when an interaction
#                      RECURS, so most turns cost zero memory tokens. Data lives
#                      under ~/.anet/memory/recmem/.
#   mem0             → mem0-backed flat store (LLM fact-extraction per pass).
#                      Data lives under ~/.anet/memory/chroma/.
# The memory LLM defaults to the manager's model; override just for memory below.
#   model: nex-agi/nex-n2-pro:free
#   provider: openrouter
memory:
  backend: recmem              # recmem | mem0  (switch takes effect on next start)
  user_profile_enabled: true   # run a memory-extraction pass on session exit
  nudge_enabled: true
  nudge_interval: 10           # turns between nudges to save useful facts (0 = off)
  incremental_interval: 5      # turns between background memory extractions (0 = off)

  # RecMem tuning (backend: recmem). Consolidation fires when an incoming
  # interaction finds >= recurrence_threshold similar snippets (cosine >=
  # sim_threshold) already buffered; dedup_threshold skips near-identical facts.
  recurrence_threshold: 2
  sim_threshold: 0.72
  dedup_threshold: 0.92

  # What mem0 should extract from conversation (steers its extraction prompt).
  instructions: >
    Capture durable facts that help future sessions: the user's identity and standing
    preferences, project locations and tech stacks, important decisions, environment
    and setup details, and explicit instructions. Ignore small talk and transient
    chatter.

  # Categories an explicit save is classified into BY THE LLM (no hardcoded tags).
  # always_inject: true  → reaches its applies_to agents every task, even when it
  #                        shares no keywords (how standing preferences get applied).
  # always_inject: false → retrieved only when relevant to the task.
  # Edit freely: add your own (e.g. a 'security_rule' that always reaches code_agent).
  categories:
  - {name: preference, always_inject: true, description: "A standing instruction or
      style to apply automatically — naming conventions, tone, output format, coding
      style, do/don't rules."}
  - {name: identity, always_inject: true, description: "Who the user is: name, role,
      background, languages, interests, team."}
  - {name: project, always_inject: false, description: "Facts about a specific project:
      its path, stack, structure, key decisions."}
  - {name: environment, always_inject: false, description: "Setup/tooling/config:
      OS, installed tools, where credentials live, important paths."}
  - {name: fact, always_inject: false, description: "Any other useful fact worth recalling
      that doesn't fit the above."}

# Context (short-term memory) — every turn the model sees a rolling summary of
# older turns plus as many recent turns as fit a token budget. The summary updates
# automatically when turns overflow the budget (one extra LLM call, only then).
context:
  enabled: true
  recent_tokens: 3000          # tokens of recent turns kept verbatim before summarising
  min_recent: 4                # always keep at least this many recent messages verbatim
  threshold: 40                # message count that triggers the manual compress/forget prompt
  keep: 20                     # recent messages kept by /forget and /compress

# Persona — injected into the manager's prompts only.
persona:
  soul_file: SOUL.md
  enabled: true

# Trajectory reduction (AgentDiet, arXiv:2509.23586) — applies to EVERY engine.
# Once a tool result lands in an agent's history it is resent on every later
# step, so one big file read early in a long task is billed dozens of times.
# When enabled, a cheap model rewrites one earlier step after each agent step,
# replacing stale/verbose content with a short note. Reported ~40% fewer input
# tokens on long coding tasks with no loss in task success.
# Costs one extra (cheap) model call per long step — so it only pays off on
# multi-step tool work, not short chats. Off by default; usage shows up under
# the `diet` stage in the token footer.
#diet:
#  enabled: true
#  model: openai/gpt-5.4-nano      # a CHEAP model — defaults to the manager model
#  provider: openrouter
#  theta: 500   # min tokens in a step before reducing it (and min saving to accept)
#  a: 2         # reduce the step this far back — never the ones still in play
#  b: 1         # steps of surrounding context given to the reducer

# Orchestration (AdaptOrch) — task-adaptive multi-agent topology. The decomposer
# breaks a request into a subtask DAG; later stages route it to a topology
# (parallel / sequential / hierarchical / hybrid) by the DAG's shape, execute, and
# synthesize. Per-stage models default to the manager model — override a stage only
# when you want to (e.g. a cheap model for decomposition to cut cost). All keys are
# optional; uncomment what you need.
# orchestration:
#   engine: adaptorch  # or: qweenbee (A/B fork) · solo (single generalist agent, no decomposition — lowest per-turn token cost) — default: adaptorch
#   # Solo engine (engine: solo only) — one agent, no decomposer/router/synthesis:
#   # solo: { model: anthropic/claude-sonnet-4.6, provider: openrouter, max_steps: 60 }  # defaults to the manager model
#   # solo.toolsets: [filesystem, shell, web, code_intel]  # default — add desktop, verify, or an mcp-backed toolset to opt in; [] = COMMON baseline only
#   # solo.tools: [checker]                                 # extra individual tools beyond the toolsets above
#   # Per-stage models (each defaults to the manager model if omitted):
#   decomposer: { model: nex-agi/nex-n2-pro:free,     provider: openrouter }  # Phase 1
#   merger:     { model: anthropic/claude-sonnet-4.6, provider: anthropic }   # Phase 5 — combine agreeing outputs
#   arbiter:    { model: anthropic/claude-sonnet-4.6, provider: anthropic }   # Phase 5 — resolve conflicts
#   # Router thresholds (paper-calibrated defaults; tune per pack):
#   # theta_omega: 0.5   # min parallelism ratio to prefer the parallel topology
#   # theta_gamma: 0.6   # coupling above this prefers hierarchical
#   # theta_delta: 5     # min subtasks for hierarchical
#   # theta_cs:    0.7   # synthesis consistency threshold (merge vs. arbiter)
#   # QweenBee planner (engine: qweenbee only) — temporal communication DAG:
#   # planner: { model: nex-agi/nex-n2-pro:free, provider: openrouter }  # defaults to manager model
#   # t_max: 4            # max communication rounds in a generated graph
#   # m_max: 16           # max total message edges
#   # beta: 3             # max inbound edges to one node in one round
orchestration:
  engine: solo
