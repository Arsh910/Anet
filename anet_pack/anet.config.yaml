# anet.config.yaml — models, memory, and per-agent settings for this pack.
# Edit with /settings. Only the keys you set here override the built-in defaults.
# API keys live in ~/.anet/.env (set them with /keys).
# Providers: openrouter · google · openai · anthropic · vertex_google · vertex_anthropic

# Color theme for this pack — set it interactively with /theme, or by hand here.
# It travels with the pack, so different packs can look different (handy for telling
# them apart). Options: cyan · emerald · amber · violet · crimson · matrix · mono
theme: cyan

# Manager — plans and coordinates every request.
# Default is a free OpenRouter model so a single free key works out of the box.
# Swap for a stronger model (e.g. anthropic/claude-sonnet-4.6) once you've added a key.
manager:
  model: nex-agi/nex-n2-pro:free
  provider: openrouter

# Per-agent overrides. Each agent uses the free default below; give any agent a
# stronger model/provider as you like. Omit an agent entirely to use the manager's.
#   max_steps        — tool-call cap (defaults: research 10, file 25, computer 20, checker 8, code 60)
#   mcp: [name]      — attach MCP servers from this pack's mcps/ (add one with /addmcp)
#   task_types: [..] — extra phrases the planner routes to this agent on
#
# Example — give code_agent a stronger model and a code-graph MCP:
#   code_agent:
#     model: anthropic/claude-sonnet-4.6
#     provider: anthropic
#     mcp: [codegraph]
agents:
  research_agent:
    model: nex-agi/nex-n2-pro:free
    provider: openrouter
  code_agent:
    model: nex-agi/nex-n2-pro:free
    provider: openrouter
  computer_agent:
    model: nex-agi/nex-n2-pro:free
    provider: openrouter
  checker_agent:
    model: nex-agi/nex-n2-pro:free
    provider: openrouter

# Self-improving skills — written after complex tasks, injected into relevant ones.
skills:
  enabled: true
  creation_threshold: 6        # min tool calls before a skill is considered
  curator_min_skills: 5        # min skills before the startup Curator runs
  max_injected: 3              # max skills injected per task
  stale_after_days: 30         # Curator archives agent-made skills unused this long
  curator_interval_hours: 12   # Curator won't re-run more often than this

# Memory — long-term memory via mem0 (local Chroma vector store + on-device
# fastembed embeddings + your LLM for fact extraction). Stored under ~/.anet/memory/.
# By default the extraction LLM is the manager's model; override it here if you want
# a cheaper/stronger model just for memory:
#   model: nex-agi/nex-n2-pro:free
#   provider: openrouter
memory:
  user_profile_enabled: true   # run a memory-extraction pass on session exit
  nudge_enabled: true
  nudge_interval: 10           # turns between nudges to save useful facts (0 = off)
  incremental_interval: 5      # turns between background memory extractions (0 = off)

  # What mem0 should extract from conversation (steers its extraction prompt).
  instructions: >
    Capture durable facts that help future sessions: the user's identity and standing
    preferences, project locations and tech stacks, important decisions, environment
    and setup details, and explicit instructions. Ignore small talk and transient chatter.

  # Categories an explicit save is classified into BY THE LLM (no hardcoded tags).
  # always_inject: true  → reaches its applies_to agents every task, even when it
  #                        shares no keywords (how standing preferences get applied).
  # always_inject: false → retrieved only when relevant to the task.
  # Edit freely: add your own (e.g. a 'security_rule' that always reaches code_agent).
  categories:
    - {name: preference,  always_inject: true,  description: "A standing instruction or style to apply automatically — naming conventions, tone, output format, coding style, do/don't rules."}
    - {name: identity,    always_inject: true,  description: "Who the user is: name, role, background, languages, interests, team."}
    - {name: project,     always_inject: false, description: "Facts about a specific project: its path, stack, structure, key decisions."}
    - {name: environment, always_inject: false, description: "Setup/tooling/config: OS, installed tools, where credentials live, important paths."}
    - {name: fact,        always_inject: false, description: "Any other useful fact worth recalling that doesn't fit the above."}

# Context (short-term memory) — every turn the model sees a rolling summary of
# older turns plus as many recent turns as fit a token budget. The summary updates
# automatically when turns overflow the budget (one extra LLM call, only then).
context:
  enabled: true
  recent_tokens: 3000          # tokens of recent turns kept verbatim before summarising
  min_recent: 4                # always keep at least this many recent messages verbatim
  threshold: 40                # message count that triggers the manual compress/forget prompt
  keep: 20                     # recent messages kept by /forget and /compress

# Persona — injected into the manager's prompts only.
persona:
  soul_file: SOUL.md
  enabled: true

# Orchestration (AdaptOrch) — task-adaptive multi-agent topology. The decomposer
# breaks a request into a subtask DAG; later stages route it to a topology
# (parallel / sequential / hierarchical / hybrid) by the DAG's shape, execute, and
# synthesize. Per-stage models default to the manager model — override a stage only
# when you want to (e.g. a cheap model for decomposition to cut cost). All keys are
# optional; uncomment what you need.
# orchestration:
#   mode: adaptorch    # 'adaptorch' = task-adaptive topology pipeline; omit/legacy = OldEngine
#   # Per-stage models (each defaults to the manager model if omitted):
#   decomposer: { model: nex-agi/nex-n2-pro:free,     provider: openrouter }  # Phase 1
#   merger:     { model: anthropic/claude-sonnet-4.6, provider: anthropic }   # Phase 5 — combine agreeing outputs
#   arbiter:    { model: anthropic/claude-sonnet-4.6, provider: anthropic }   # Phase 5 — resolve conflicts
#   # Router thresholds (paper-calibrated defaults; tune per pack):
#   # theta_omega: 0.5   # min parallelism ratio to prefer the parallel topology
#   # theta_gamma: 0.6   # coupling above this prefers hierarchical
#   # theta_delta: 5     # min subtasks for hierarchical
#   # theta_cs:    0.7   # synthesis consistency threshold (merge vs. arbiter)
