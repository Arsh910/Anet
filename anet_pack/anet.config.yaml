# Providers: openrouter · google · openai · anthropic · vertex_google · vertex_anthropic

# Color theme for this pack — set it interactively with /theme, or by hand here.
theme: mono

# Extra providers (optional) — any OpenAI-compatible /v1 endpoint. Built-ins
providers:
#   ollama:
#     base_url: http://localhost:11434/v1
#   lmstudio:
#     base_url: http://localhost:1234/v1
  omniroute:                        # multi-provider gateway w/ quota fallback
    base_url: http://localhost:20128/v1
    env_key: OMNIROUTE_API_KEY

# Manager — plans and coordinates every request.
# Default is a free OpenRouter model so a single free key works out of the box.
# Swap for a stronger model (e.g. anthropic/claude-sonnet-4.6) once you've added a key.
# Per-agent overrides. Each agent uses the free default below; give any agent a
# stronger model/provider as you like. Omit an agent entirely to use the manager's.
#   max_steps        — tool-call cap (defaults: research 10, file 25, computer 20, checker 8, code 60)
#   mcp: [name]      — attach MCP servers from this pack's mcps/ (add one with /addmcp)
#   task_types: [..] — extra phrases the planner routes to this agent on
#
# Example — give code_agent a stronger model and a code-graph MCP:
#   code_agent:
#     model: anthropic/claude-sonnet-4.6
#     provider: anthropic
#     mcp: [codegraph]

manager:
  model: nvidia/nvidia/nemotron-3-ultra-550b-a55b
  provider: omniroute

agents:
  research_agent:
    model: nvidia/google/gemma-4-31b-it
    provider: omniroute

  computer_agent:
    model: nvidia/qwen/qwen3.5-397b-a17b
    provider: omniroute

  checker_agent:
    model: nvidia/nvidia/nemotron-3-super-120b-a12b
    provider: omniroute

  code_agent:
    model: siliconflow/moonshotai/Kimi-K2.6
    provider: omniroute
    mcp: [ponytail, playwright, gentleman-book, open-design]  # playwright moved here (file_agent retired)
    task_types:
    - "ponytail mcp"
    - "playwright mcp"
    - "gentleman-book"
    - "open-design"

# Self-improving skills — written after complex tasks, injected into relevant ones.

skills:
  enabled: true
  creation_threshold: 6        # min tool calls before a skill is considered
  curator_min_skills: 5        # min skills before the startup Curator runs
  max_injected: 3              # max skills injected per task
  stale_after_days: 30         # Curator archives agent-made skills unused this long
  curator_interval_hours: 12   # Curator won't re-run more often than this


memory:
  backend: recmem              # recmem | mem0  (switch takes effect on next start)
  user_profile_enabled: true   # run a memory-extraction pass on session exit
  nudge_enabled: true
  nudge_interval: 10           # turns between nudges to save useful facts (0 = off)
  incremental_interval: 5      # turns between background memory extractions (0 = off)

  # RecMem tuning (backend: recmem). Consolidation fires when an incoming
  recurrence_threshold: 2
  sim_threshold: 0.72
  dedup_threshold: 0.92

  # What mem0 should extract from conversation (steers its extraction prompt).
  instructions: >
    Capture durable facts that help future sessions: the user's identity and standing
    preferences, project locations and tech stacks, important decisions, environment
    and setup details, and explicit instructions. Ignore small talk and transient
    chatter.

  # Categories an explicit save is classified into BY THE LLM (no hardcoded tags).
  categories:
  - {name: preference, always_inject: true, description: "A standing instruction or
      style to apply automatically — naming conventions, tone, output format, coding
      style, do/don't rules."}
  - {name: identity, always_inject: true, description: "Who the user is: name, role,
      background, languages, interests, team."}
  - {name: project, always_inject: false, description: "Facts about a specific project:
      its path, stack, structure, key decisions."}
  - {name: environment, always_inject: false, description: "Setup/tooling/config:
      OS, installed tools, where credentials live, important paths."}
  - {name: fact, always_inject: false, description: "Any other useful fact worth recalling
      that doesn't fit the above."}

# Context (short-term memory) — every turn the model sees a rolling summary of
context:
  enabled: true
  recent_tokens: 3000          # tokens of recent turns kept verbatim before summarising
  min_recent: 4                # always keep at least this many recent messages verbatim
  threshold: 40                # message count that triggers the manual compress/forget prompt
  keep: 20                     # recent messages kept by /forget and /compress

# Persona — injected into the manager's prompts only.
persona:
  soul_file: SOUL.md
  enabled: true

# Prompt caching — ON for every agent, model and engine by default. (make sure for this, models are from anthropic)
caching:
  attempt_all_models: false

# Trajectory reduction (AgentDiet, arXiv:2509.23586) — applies to EVERY engine.
# diet:
#   enabled: true
#   model: openai/gpt-5.4-nano      # a CHEAP model — defaults to the manager model
#   provider: openrouter
#   theta: 500   # min tokens in a step before reducing it (and min saving to accept)
#   a: 2         # reduce the step this far back — never the ones still in play
#   b: 1         # steps of surrounding context given to the reducer

# orchestration:
  # AdaptOrch
    # theta_omega: 0.5   # min parallelism ratio to prefer the parallel topology
    # theta_gamma: 0.6   # coupling above this prefers hierarchical
    # theta_delta: 5     # min subtasks for hierarchical
    # theta_cs:    0.7   # synthesis consistency threshold (merge vs. arbiter)

  # QweenBee planner (engine: qweenbee only) — temporal communication DAG:
    # t_max: 4            # max communication rounds in a generated graph
    # m_max: 16           # max total message edges
    # beta: 3             # max inbound edges to one node in one round

orchestration:
  engine: qweenbee
