# exanet.config.yaml — this pack's external tools and agents.
# Edit with /editpack, or let the smiths write it: /newtool, /newagent, /addmcp.
# Guides: ExTools/README.md · ExAgents/README.md · mcps/README.md

# ── Tools ──────────────────────────────────────────────────────────────────────
# Each is a folder under ExTools/ with an __init__.py exporting SCHEMA + run().
tools:
  - name: tele_tool
    path: ExTools/tele_tool      # example: sends messages/files to Telegram

# ── Agents ─────────────────────────────────────────────────────────────────────
# The planner routes to an agent by matching the request against its task_types.
#   prompt_file — prompt path within this pack (or use system_prompt: "...")
#   tools       — built-in tool names and/or ExTools registered above
#   mcp         — MCP servers from mcps/<name>/
#   enabled     — set false (or omit the block) to keep an agent dormant
#   to let an agent delegate to other agents, add `spawn_tool` to its tools
agents:
  - name: tele_agent             # example: Telegram notifier
    model: openai/gpt-oss-20b:free
    provider: openrouter
    enabled: true                # needs creds in ExAgents/tele_agent/.env
    prompt_file: ExAgents/tele_agent/prompt.md
    tools: [tele_tool]
    task_types:
      - send a telegram message
      - notify me on telegram

# ── Attach to built-in agents ───────────────────────────────────────────────────
# Give a built-in agent (code_agent, research_agent, file_agent, computer_agent)
# extra tools/MCP without editing anet.config.yaml. The smiths write here; merged
# in at startup. Example:
#
# attach:
#   code_agent:
#     tools: [my_tool]
#     mcp:   [my_server]
