# ANet Plugin Manifest вЂ” tele_agent
# Run `anet validate` to check, then `anet connect` to go live.
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Required env vars:
#   TELEGRAM_BOT_TOKEN  вЂ” from @BotFather
#   TELEGRAM_CHAT_ID    вЂ” your chat or group ID

identity:
  name: tele_agent
  version: 1.0.0
  description: Sends messages and files to a Telegram chat via the Telegram Bot API
  author: ""

model:
  name: inclusionai/ring-2.6-1t:free
  provider: openrouter
  temperature: 0.1
  max_tokens: 512

capabilities:
  task_types:
    - send telegram message
    - notify via telegram
    - telegram notification
    - message user on telegram
    - send message to telegram
    - send file via telegram
    - send photo via telegram
    - send image to telegram
    - send video via telegram
    - send audio via telegram
    - send document via telegram
    - share file on telegram

tools:
  - name: tele_tool
    file: tools/tele_tool.py
    description: Send a text message to a Telegram chat

prompt:
  file: prompts/system.txt

behavior:
  timeout: 90
  can_be_parallelized: true
  requires_confirmation: false
  execution: sync
